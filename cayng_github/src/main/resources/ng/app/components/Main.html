<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Main</title>
	</head>
	<body>
	
	 
		<h3>Create person or Créer une personne </h3>
		<wo:form>
			<wo:textfield value="$newPersonName" /> <wo:submit action="$createPerson" value="Create :" />
		</wo:form>
		<hr />
		<h3>People</h3>
		<ul>
		<wo:repetition list="$people" item ="$person">
			<li><wo:str value="$person.nom" /></li>
		</wo:repetition>
		</ul>
	
	</body>

</html>
